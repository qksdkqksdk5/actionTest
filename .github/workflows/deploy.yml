name: Deploy to Ubuntu

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Tailscale 연결 (GitHub 서버가 내 가상머신을 찾게 함)
      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # 2. SSH 접속 후 배포 스크립트 실행
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}     # Tailscale에서 받은 100.x.x.x 주소
          username: ${{ secrets.REMOTE_USER }} # ubuntu
          key: ${{ secrets.SSH_KEY }}       # 아까 생성한 id_rsa 내용
          port: 22
          script: |
            cd ~/바탕화면/TADS/Real_project
            git pull origin main

            # 1. Frontend (React) - 기존과 동일
            cd frontend_js
            npm install
            fuser -k 5173/tcp || true
            nohup npm run dev -- --host > react.log 2>&1 &

            # 2. Backend (Flask) - Conda 가상환경 적용
            cd ../backend_flask
            
            # Conda 초기화 및 가상환경 활성화 (미니콘다 설치 경로 확인 필요)
            source ~/miniconda3/etc/profile.d/conda.sh || source ~/anaconda3/etc/profile.d/conda.sh
            conda activate tapj
            
            # 가상환경 상태에서 Flask 재시작
            fuser -k 5000/tcp || true
            nohup python app.py > flask.log 2>&1 &

            echo "Conda 환경(tapj)에서 Flask와 React가 재시작되었습니다!"