name: Deploy to Ubuntu

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Tailscale 연결 (GitHub 서버가 내 가상머신을 찾게 함)
      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # 2. SSH 접속 후 배포 스크립트 실행
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}     # Tailscale에서 받은 100.x.x.x 주소
          username: ${{ secrets.REMOTE_USER }} # ubuntu
          key: ${{ secrets.SSH_KEY }}       # 아까 생성한 id_rsa 내용
          port: 22
          script: |
            cd ~/바탕화면/TADS/Real_project
            git pull origin main

            # 1. Frontend (React) 재실행
            cd frontend_js
            npm install                        # 패키지 변화 대응
            fuser -k 5173/tcp || true          # 기존 React(Vite) 프로세스 종료
            # 백그라운드 실행 (로그는 react.log에 저장, --host는 외부 접속 허용 설정)
            nohup npm run dev -- --host > react.log 2>&1 &

            # 2. Backend (Flask) 재실행
            cd ../backend_flask
            # 가상환경 사용 시: source venv/bin/activate
            # pip install -r requirements.txt
            fuser -k 5000/tcp || true          # 기존 Flask 프로세스 종료
            # 백그라운드 실행 (로그는 flask.log에 저장)
            nohup python3 app.py > flask.log 2>&1 &

            echo "React(5173)와 Flask(5000) 모두 재시작되었습니다!"